spring:
  application:
    name: partyScout
  datasource:
    url: jdbc:h2:mem:partyscout;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    gcp:
      project-id: local-dev
      pubsub:
        enabled: false
      sql:
        enabled: false

server:
  port: ${SERVER_PORT:8080}

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    base-url: https://maps.googleapis.com/maps/api/place

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  project-id: ${FIREBASE_PROJECT_ID:}

# Logging configuration — levels are managed in logback-spring.xml per profile.
# Override here only for runtime tuning without redeploy.
logging:
  level:
    com.partyscout: INFO
    org.springframework.web: INFO
    # Suppress framework noise
    org.apache.catalina: WARN
    io.netty: WARN

# Jackson configuration for JSON serialization
spring.jackson:
  serialization:
    write-dates-as-timestamps: false
  time-zone: UTC
