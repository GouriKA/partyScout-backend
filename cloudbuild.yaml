steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/partyscout-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/partyscout-backend:latest'
      - '.'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/partyscout-backend:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'partyscout-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/partyscout-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--update-secrets'
      - 'FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account-json:latest'
      - '--update-env-vars'
      - 'FIREBASE_PROJECT_ID=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/partyscout-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/partyscout-backend:latest'
