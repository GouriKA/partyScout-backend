steps:
  # Deploy to prod (us-central1) — manually triggered only
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'partyscout-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/partyscout-backend:${_IMAGE_TAG}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '120'
      - '--update-secrets'
      - 'FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account-json:latest,GOOGLE_PLACES_API_KEY=google-places-api-key:latest,SMTP_HOST=smtp-host:latest,SMTP_USERNAME=smtp-username:latest,SMTP_PASSWORD=smtp-password:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest'
      - '--update-env-vars'
      - 'FIREBASE_PROJECT_ID=$PROJECT_ID'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE_TAG: 'latest'
